plugins {
    id 'java'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'org.spongepowered.mixin' version '0.7.+'
}

version = '1.0.0'
group = 'com.dmzkiaddon'
archivesBaseName = 'DMZKiAddon'

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

minecraft {
    mappings channel: 'official', version: '1.20.1'

    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            property 'forge.enabledGameTestNamespaces', 'dmzkiaddon'
            mods {
                dmzkiaddon {
                    source sourceSets.main
                }
            }
        }

        server {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            property 'forge.enabledGameTestNamespaces', 'dmzkiaddon'
            mods {
                dmzkiaddon {
                    source sourceSets.main
                }
            }
        }
    }
}

mixin {
    add sourceSets.main, 'dmzkiaddon.refmap.json'
    config 'dmzkiaddon.mixins.json'
}

repositories {
    flatDir {
        dirs 'libs'
    }
    maven { url = 'https://maven.minecraftforge.net/' }
    maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
}

dependencies {
    minecraft "net.minecraftforge:forge:${forge_version}"
    implementation fg.deobf('com.dragonminez:dragonminez:2.0.2')
    implementation fg.deobf('software.bernie.geckolib:geckolib-forge-1.20.1-4.8.3:4.8.3')  // compileOnly → implementation
    implementation fg.deobf('org.terraform:TerraBlender-forge-1.20.1-3.0.1.10:3.0.1.10')
    implementation fg.deobf('com.facub8.dmzsuper:dmzsuper:1.6.2')
}


jar {
    manifest {
        attributes([
            'Specification-Title'    : 'DMZKiAddon',
            'Specification-Vendor'   : 'carlosn2300k',
            'Specification-Version'  : '1',
            'Implementation-Title'   : project.name,
            'Implementation-Version' : project.jar.archiveVersion,
            'Implementation-Vendor'  : 'carlosn2300k, Facub, InmortalPx',
            'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
            'MixinConfigs'           : 'dmzkiaddon.mixins.json'
        ])
    }
}
